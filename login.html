<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Cod Store | Login</title>
  <meta name="description" content="Login to The Cod Store account." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Space Grotesk', sans-serif; }
    .font-orbitron { font-family: 'Orbitron', sans-serif; }
    .bg-grid { position: fixed; inset: 0; z-index: -1; background-image: linear-gradient(rgba(56,189,248,.1) 1px, transparent 1px), linear-gradient(90deg, rgba(56,189,248,.1) 1px, transparent 1px); background-size: 26px 26px; mask-image: radial-gradient(circle at center, black 30%, transparent 80%); }
    #message.error { color: #fb7185; }
    #message.success { color: #4ade80; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100">
  <div class="bg-grid" aria-hidden="true"></div>

  <main class="grid min-h-screen place-items-center p-4">
    <section class="w-full max-w-md rounded-2xl border border-slate-700 bg-slate-900/80 p-5">
      <a class="font-orbitron text-sm font-extrabold tracking-wide" href="index.html">THE COD <span class="text-cyan-400">STORE</span></a>
      <h1 class="mt-3 text-2xl font-bold">Sign in to your account</h1>
      <p class="mt-1 text-sm text-slate-300">Track your orders and checkout faster.</p>

      <form id="login-form" class="mt-4 grid gap-3" novalidate>
        <label class="grid gap-1 text-sm">Email<input id="email" name="email" type="email" autocomplete="email" placeholder="you@example.com" class="rounded-lg border border-slate-600 bg-slate-900 px-3 py-2" required /></label>
        <label class="grid gap-1 text-sm">Password
          <div class="relative">
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Enter your password" minlength="6" class="w-full rounded-lg border border-slate-600 bg-slate-900 px-3 py-2 pr-16" required />
            <button id="toggle-password" type="button" class="absolute right-2 top-1/2 -translate-y-1/2 rounded-md border border-slate-600 bg-slate-800 px-2 py-1 text-xs">Show</button>
          </div>
        </label>

        <label class="flex items-center gap-2 text-sm"><input id="remember" name="remember" type="checkbox" /> Remember me</label>
        <button class="rounded-xl bg-cyan-400 px-4 py-3 font-bold text-slate-950" type="submit">Login</button>
        <p id="message" class="text-sm text-slate-300" aria-live="polite"></p>
      </form>

      <div class="mt-3 flex items-center justify-between text-sm text-slate-400">
        <a href="index.html" class="hover:text-white">Back to Store</a>
        <a href="#" aria-disabled="true" class="hover:text-white">Forgot password?</a>
      </div>
    </section>
  </main>

  <script src="login.js"></script>
</body>
</html>
